<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login Form</title>

        <!-- font-family  -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet">


        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

        <style>
            * {
                font-family: "Geist", sans-serif;
            }
        </style>
    </head>

    <body class="bg-base-200">
        <div class="min-h-screen max-w-[520px] bg-base-100 shadow mx-auto">
            <div class="logo  mx-auto pt-[150px]">

                <img class="block mx-auto" src="assets/github-logo.png" alt="">

                <h1 class="text-[24px] font-semibold text-center mt-10 mb-1">GitHub Issues Tracker</h1>
                <p class="font-semibold text-center">Sign in to manage your issues</p>
            </div>

            <div class="form pt-8">
                <div class="card  w-full  shrink-0  mx-auto rounded-2xl">
                    <div class="card-body ">
                        <fieldset class="fieldset">
                            <label class="label font-bold text-neutral ">Username</label>
                            <input id="mobile" maxlength="11" minlength="11" type="text"
                                class="input rounded-[10px] font-light bg-base-200 w-[456px] mx-auto" placeholder="Enter Username"
                                value="" />
                            <br>
                            <label class="label font-bold text-neutral">Password</label>
                            <input id="digit" maxlength="8" minlength="8" type="password"
                                class="input rounded-[10px] font-light bg-base-200 w-[456px] mx-auto " placeholder="Enter Password" />
                            <button id="login-btn"
                                class="btn btn-primary mt-4 rounded-[10px] text-[20px] font-semibold w-[456px] mx-auto">Sign
                                In</button>
                        </fieldset>
                    </div>
                </div>
            </div>

            <div class="flex justify-center items-center my-4 w-[456px] mx-auto">
                <div class="flex-grow border-t  border-gray-300"></div>
                <span class="px-3 text-gray-500 font-medium">OR</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <div class="bg-[#F8FAFC] w-[456px] mx-auto p-[30px] rounded-xl">
                <div class="flex justify-center items-center gap-1">
                    <p class="text-[16px] font-semibold">Username:</p>
                    <p>admin</p>
                </div>
                <div class="flex justify-center items-center gap-1">
                    <p class="text-[16px] font-semibold">Password:</p>
                    <p>admin123</p>
                </div>
            </div>
        </div>



        <script src="login.js"></script>
    </body>

</html>
