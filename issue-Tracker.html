<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GitHub Issues Tracker</title>

        <!-- font-family  -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet">


        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous" referrerpolicy="no-referrer" />

        <style>
            header {
                max-width: 1600px;
                margin: 0 auto;
            }

            * {
                font-family: "Geist", sans-serif;
            }
        </style>
    </head>

    <body class="bg-base-200">

        <div class="sticky top-0">
        <div class="border-b-1  ">
            <header class="pt-[23px] pb-[23px]   flex justify-between items-center bg-white ">
                <div class="flex justify-start items-center gap-1">
                    <img class="w-[36px]" src="assets/github-logo.png" alt="">
                    <h1 class="text-[24px] font-semibold">GitHub Issues Tracker</h1>
                </div>

                <div class="flex justify-center items-center gap-[20px]">
                    <div>

                        <div class="">
                            <input id="input-search" type="text" class="input  font-light bg-base-100 "
                                placeholder="Search issues..." value="" />
                        </div>

                        <div class="validator-hint hidden">Enter valid email address</div>
                    </div>
                    <button id="btn-search" class="btn btn-primary"> <i class="fa-solid fa-magnifying-glass"></i> Search</button>
                </div>

            </header>
        </div>
        <section class="pt-[60px] bg-base-200 mt-[0px]  ">
            <div class="tab-section max-w-[1300px] mx-auto flex  gap-2 bg-base-100 p-[24px] rounded-[10px] shadow-lg ">
                <button id="AllBtn" onclick="filterIssues('all')"
                    class="btn btn-primary w-[120px] border-1 border-gray-200 shadow-none ">All</button>
                <button id="openBtn" onclick="filterIssues('open')" class="btn w-[120px] ">Open</button>
                <button id="closeBtn" onclick="filterIssues('closed')" class="btn w-[120px] ">Closed</button>
            </div>
        </section>

        <section class="  bg-base-200 py-[16px]">
            <div class=" issues-summary max-w-[1300px] mx-auto bg-base-100 p-[24px] rounded-t-lg ">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-1">
                        <div class=""><img src="assets/Aperture.png" alt="">
                        </div>
                        <div class="">
                            <h2 id="issue-count" class="text-[20px] font-semibold">0 Issues</h2>
                            <h3 class="text-[##64748B]">Track and manage your project issues</h3>
                        </div>
                    </div>

                    <div class="flex items-center gap-2">
                        <div class="w-[20px] h-[20px] bg-[#00A96E] rounded-full"></div>
                        <div class="">Open</div>
                        <div class="w-[20px] h-[20px] bg-[#A855F7] rounded-full"></div>
                        <div class="">Closed</div>
                    </div>
                </div>
            </div>
        </section>

        </div>

        <section class="bg-base-200 min-h-screen ">
            <div id="issue-container"
                class=" bg-base-100 max-w-[1300px]  mx-auto p-[24px] grid  sm:grid-cols-4 grid-cols-1 gap-[13px] ">

            </div>

             <div id="loadingSpinner" class=" hidden h-[60vh]  flex-col justify-center items-center">
            <span class="loading loading-spinner loading-xl"></span>
            </div>

        </section>


        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">

                <div id="details-card" class="">
                    <div class="">
                        <div class="">
                            <h1 class="text-[32px] font-bold text-[#1E293B] leading-tight">Fix broken image uploads</h1>
                        </div>

                        <div class="flex items-center gap-3">
                            <span
                                class="bg-[#10B981] text-white px-4 py-1 rounded-full text-sm font-semibold">Opened</span>
                            <div class="flex items-center gap-2 text-[#64748B] text-md">
                                <span>•</span>
                                <p>Opened by <span class="font-medium">Fahim Ahmed</span></p>
                                <span>•</span>
                                <p>22/02/2026</p>
                            </div>
                        </div>

                        <div class="">
                            <button
                                class="w-[120px] h-[30px] rounded-full bg-red-200 text-red-700 border border-red-500 hover:bg-blue-500 hover:text-white hover:border-none">ggg</button>
                            <button
                                class="w-[120px] h-[30px] rounded-full bg-[#eed77b] text-red-700 border border-[#cfa90e] hover:bg-blue-500 hover:text-white hover:border-none">ggg</button>
                        </div>

                        <div class="">
                            <div class="">
                                <p class="text-[#94A3B8] text-sm font-medium ">Assignee:</p>
                                <p class="text-[#1E293B] text-xl font-bold ">Fahim Ahmed</p>
                            </div>

                            <div class="">
                                <p class="text-[#94A3B8] text-sm font-medium  ">Priority:</p>
                                <span
                                    class="inline-block bg-[#EF4444] text-white px-5 py-1 rounded-full text-sm font-extrabold shadow-sm">HIGH</span>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="modal-action">
                    <form method="dialog">
                       
                        <button class="btn btn-primary">Close</button>
                    </form>
                </div>
            </div>
        </dialog>


        <script src="script.js"></script>




    </body>

</html>
